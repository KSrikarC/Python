<html>
    <head>
        <title>Students Data</title>
        <style>
            h1{text-align: center;}
            table, th, td {border: 1px solid rgb(255, 0, 0)};

        </style>
    </head>
    
    <body bgcolor="black" text="white">
        <h1>
            Students Details
        </h1>
        <table align="center">
            <tr> 
                <td> ID </td>
                <td> Name </td>
                <td> Department </td>                
            </tr>                
                {% for row in records %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                </tr>
                {% endfor %}
            </table>
        </table>
    </body>



</html>
